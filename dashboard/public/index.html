<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>Somnus · console</title>
<style>
:root{
  --bg:#282828; --bg-h:#1d2021; --bg-s:#32302f; --fg:#ebdbb2; --gray:#928374;
  --red:#fb4934; --green:#b8bb26; --yellow:#fabd2f; --blue:#83a598;
  --purple:#d3869b; --aqua:#8ec07c; --orange:#fe8019;
  --mono: ui-monospace,"SF Mono","JetBrains Mono",Menlo,Consolas,monospace;
}

*{ box-sizing:border-box; }
html,body{ margin:0; height:100%; overflow:hidden;
  background:var(--bg); color:var(--fg);
  font-family:var(--mono); font-size:13px;
  -webkit-font-smoothing:none; image-rendering:pixelated;
  user-select:none; }

/* scanline overlay */
body::after{
  content:''; position:fixed; inset:0; pointer-events:none; z-index:9999;
  background:repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.08) 2px,
    rgba(0,0,0,0.08) 4px
  );
}

#stage{ position:fixed; inset:0; z-index:2; }

/* ===================== BMO ===================== */
#bmo{
  position:fixed; left:50%; top:50%;
  transform:translate(-50%,-50%);
  z-index:3;
  width:220px;
  display:flex; flex-direction:column; align-items:center;
  gap:0;
}

/* body */
#bmo .bmo-body{
  position:relative;
  width:200px; height:240px;
  background:var(--aqua);
  border:3px solid var(--bg-h);
  box-shadow:4px 4px 0 var(--bg-h);
  border-radius:18px 18px 12px 12px;
  display:flex; flex-direction:column; align-items:center;
  padding:8px 8px 6px;
}

/* speaker dots */
#bmo .bmo-body::before{
  content:'· · ·';
  position:absolute; top:8px; right:14px;
  font-size:9px; letter-spacing:3px;
  color:rgba(0,0,0,0.3);
}

/* screen */
.bmo-screen{
  width:174px; height:162px;
  background:var(--bg-h);
  border:3px solid var(--bg-h);
  box-shadow:inset 2px 2px 0 #000, 2px 2px 0 rgba(0,0,0,0.5);
  border-radius:4px;
  display:flex; flex-direction:column;
  overflow:hidden;
  position:relative;
}

/* face layer */
#bmo-face{
  position:absolute; inset:0;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  gap:6px;
  pointer-events:none;
  z-index:1;
  transition:opacity 0.3s;
}
#bmo-face.hidden{ opacity:0; }

#bmo-face .eye{
  display:inline-block;
  width:10px; height:10px;
  background:var(--aqua);
  border:2px solid var(--bg-h);
  border-radius:2px;
}
#bmo-face .eyes{ display:flex; gap:18px; }

#bmo-face .mouth{
  width:28px; height:6px;
  background:var(--aqua);
  border:2px solid var(--bg-h);
  border-radius:2px;
}

/* awake: slow blink */
#bmo-face[data-mood="awake"] .eye{
  animation:blink 4s ease-in-out infinite;
}
@keyframes blink{
  0%,90%,100%{ transform:scaleY(1); }
  95%{ transform:scaleY(0.1); }
}

/* thinking: eye dots, pulse */
#bmo-face[data-mood="thinking"] .eye{
  background:var(--yellow);
  animation:think-pulse 0.5s ease-in-out infinite alternate;
}
#bmo-face[data-mood="thinking"] .mouth{
  background:var(--yellow);
}
@keyframes think-pulse{
  from{ opacity:0.5; }
  to{ opacity:1; }
}

/* happy: curved mouth */
#bmo-face[data-mood="happy"] .eye{
  background:var(--green);
  transform:scaleY(0.6);
}
#bmo-face[data-mood="happy"] .mouth{
  background:var(--green);
  border-radius:0 0 6px 6px;
  height:8px;
}

/* dreaming: closed eyes, slow breath */
#bmo-face[data-mood="dreaming"] .eye{
  background:var(--purple);
  transform:scaleY(0.15);
}
#bmo-face[data-mood="dreaming"] .mouth{
  background:var(--purple);
  width:16px;
}
#bmo-face[data-mood="dreaming"]{
  animation:dream-breath 3s ease-in-out infinite;
}
@keyframes dream-breath{
  0%,100%{ transform:scale(1); }
  50%{ transform:scale(1.04); }
}

/* resting: dim, still */
#bmo-face[data-mood="resting"] .eye{
  background:var(--gray);
  transform:scaleY(0.15);
}
#bmo-face[data-mood="resting"] .mouth{
  background:var(--gray);
  width:20px;
}

/* chat log + form inside screen */
#chatlog{
  position:absolute; inset:0 0 34px 0;
  overflow-y:auto; overflow-x:hidden;
  padding:5px 6px;
  display:flex; flex-direction:column; gap:3px;
  scrollbar-width:thin; scrollbar-color:var(--gray) transparent;
  z-index:2;
}
#chatlog .msg{
  font-size:10px; line-height:1.4; word-break:break-word;
  padding:2px 4px;
  border:1px solid transparent;
  max-width:100%;
}
#chatlog .msg.you{
  color:var(--yellow); border-color:rgba(250,189,47,0.3);
  align-self:flex-end; text-align:right;
  background:rgba(250,189,47,0.07);
}
#chatlog .msg.somnus{
  color:var(--aqua); border-color:rgba(142,192,124,0.3);
  align-self:flex-start;
  background:rgba(142,192,124,0.07);
}
#chatlog .msg.sys{
  color:var(--gray); font-style:italic;
  align-self:center; font-size:9px;
}

#chatform{
  position:absolute; bottom:0; left:0; right:0; height:34px;
  display:flex; border-top:2px solid var(--bg-s);
  z-index:2; background:var(--bg);
}
#chatinput{
  flex:1; background:transparent; border:none; outline:none;
  color:var(--fg); font-family:var(--mono); font-size:10px;
  padding:0 6px; letter-spacing:0.03em;
}
#chatinput::placeholder{ color:var(--gray); }
#chatform button{
  background:none; border:none; border-left:2px solid var(--bg-s);
  color:var(--green); cursor:pointer; padding:0 8px;
  font-size:11px; font-family:var(--mono);
  transition:color 0.1s;
}
#chatform button:hover{ color:var(--yellow); }

/* BMO controls bar */
.bmo-controls{
  width:174px;
  display:flex; align-items:center; justify-content:space-between;
  margin-top:6px;
  padding:0 2px;
}

.dpad{
  display:grid; grid-template-columns:14px 14px 14px; grid-template-rows:14px 14px 14px;
  gap:1px;
}
.dpad::before{
  content:'';
  display:block;
  grid-column:1/4; grid-row:1/4;
  background:
    linear-gradient(var(--bg-h) 0, var(--bg-h) 100%) center / 14px 42px no-repeat,
    linear-gradient(var(--bg-h) 0, var(--bg-h) 100%) center / 42px 14px no-repeat;
  border:2px solid var(--bg-h);
  box-shadow:1px 1px 0 var(--bg-h);
}

.bmo-buttons{
  display:grid; grid-template-columns:14px 14px; gap:4px;
}
.btn{
  display:block; width:14px; height:14px; border-radius:50%;
  border:2px solid var(--bg-h);
  box-shadow:1px 1px 0 var(--bg-h);
}
.btn.green{ background:var(--green); }
.btn.red{ background:var(--red); }
.btn.blue{ background:var(--blue); }
.btn.yellow{ background:var(--yellow); }

/* arms/legs */
#bmo .bmo-arms{
  position:absolute;
  top:60px; left:-14px; right:-14px;
  display:flex; justify-content:space-between;
  pointer-events:none;
}
.arm{
  width:12px; height:50px;
  background:var(--aqua);
  border:3px solid var(--bg-h);
  box-shadow:3px 3px 0 var(--bg-h);
  border-radius:4px;
}
#bmo .bmo-legs{
  display:flex; gap:18px; margin-top:4px;
}
.leg{
  width:22px; height:20px;
  background:var(--aqua);
  border:3px solid var(--bg-h);
  box-shadow:3px 3px 0 var(--bg-h);
  border-radius:0 0 6px 6px;
}

/* BMO label */
#bmo .bmo-label{
  margin-top:3px;
  font-size:9px; letter-spacing:0.3em;
  color:var(--gray); text-transform:uppercase;
}

/* ===================== WINDOWS ===================== */
.win{
  position:absolute; min-width:220px; min-height:120px; width:320px; height:240px;
  background:var(--bg-s);
  border:3px solid var(--bg-h);
  box-shadow:4px 4px 0 var(--bg-h);
  display:flex; flex-direction:column; overflow:hidden;
  opacity:1; top:0; left:0;
}
.win.dim{ opacity:0.3; filter:saturate(0.4); }
.win.focused{ box-shadow:4px 4px 0 var(--accent, var(--blue)); z-index:100; opacity:1; }

.win .bar{
  display:flex; align-items:center; gap:6px; padding:5px 8px;
  cursor:grab; background:var(--bg-h);
  border-bottom:3px solid var(--bg-h);
  flex:0 0 auto; touch-action:none;
}
.win .bar:active{ cursor:grabbing; }

.win .dots{ display:flex; gap:4px; }
.win .dot{
  width:8px; height:8px;
  background:var(--accent, var(--blue));
  border:2px solid var(--bg-h);
  box-shadow:1px 1px 0 var(--bg-h);
  flex:0 0 auto;
}
.win .dot2{ background:var(--bg); }
.win .dot3{ background:var(--bg-s); }

.win .ttl{
  letter-spacing:0.18em; text-transform:uppercase;
  font-size:10px; color:var(--fg); flex:1;
}
.win .ttl small{ color:var(--gray); letter-spacing:0.04em; text-transform:none; }

.win .body{
  flex:1; overflow:auto; padding:8px 10px; user-select:text;
  scrollbar-width:thin; scrollbar-color:var(--gray) transparent;
}
.win .body::-webkit-scrollbar{ width:5px; }
.win .body::-webkit-scrollbar-thumb{ background:var(--gray); border-radius:0; }

.win .grip{
  position:absolute; right:0; bottom:0; width:14px; height:14px;
  cursor:nwse-resize; touch-action:none;
  background:linear-gradient(135deg, transparent 50%, var(--gray) 50%, var(--gray) 62%, transparent 62%, transparent 74%, var(--gray) 74%);
}

/* content bits */
.row{
  padding:5px 0;
  border-bottom:1px solid var(--bg-h);
  line-height:1.45;
}
.row:last-child{ border-bottom:0; }
.tag{
  display:inline-block; padding:1px 5px;
  font-size:9px; letter-spacing:0.05em;
  background:rgba(131,165,152,0.15); color:var(--blue);
  border:1px solid var(--blue);
}
.tag.v{ background:rgba(211,134,155,0.15); color:var(--purple); border-color:var(--purple); }
.meta{ color:var(--gray); font-size:10px; }
.big{ font-size:32px; color:var(--fg); letter-spacing:0.02em; }
.sub{ color:var(--gray); font-size:10px; margin-top:2px; }
.bars{ display:flex; align-items:flex-end; gap:4px; height:60px; margin-top:12px; }
.bars .b{
  flex:1; background:var(--blue);
  min-height:2px; position:relative;
}
.bars .b span{
  position:absolute; bottom:-14px; left:0; right:0;
  text-align:center; font-size:9px; color:var(--gray);
}
.state-badge{
  font-size:9px; letter-spacing:0.1em; text-transform:uppercase;
  padding:1px 5px; border:1px solid;
}
.s-completed{ color:var(--green); border-color:var(--green); }
.s-active,.s-created{ color:var(--blue); border-color:var(--blue); }
.s-failed{ color:var(--red); border-color:var(--red); }
.s-null{ color:var(--gray); border-color:var(--gray); }
.empty{ color:var(--gray); font-style:italic; padding:6px 0; }
.err{ color:var(--red); }

#hint{
  position:fixed; left:12px; bottom:10px; z-index:4;
  color:var(--gray); font-size:9px; letter-spacing:0.1em; pointer-events:none;
}
#reset{
  position:fixed; right:12px; bottom:10px; z-index:4;
  color:var(--gray); font-size:9px; letter-spacing:0.1em;
  cursor:pointer; background:none;
  border:2px solid var(--bg-h);
  box-shadow:2px 2px 0 var(--bg-h);
  padding:3px 8px; font-family:var(--mono);
}
#reset:hover{ color:var(--yellow); border-color:var(--yellow); }

@media (prefers-reduced-motion: reduce){
  #bmo-face .eye, #bmo-face{ animation:none !important; }
}
</style>
</head>
<body>
<div id="stage"></div>

<!-- BMO -->
<div id="bmo">
  <div class="bmo-body">
    <div class="bmo-arms">
      <div class="arm"></div>
      <div class="arm" style="box-shadow:-3px 3px 0 var(--bg-h)"></div>
    </div>
    <div class="bmo-screen">
      <div id="bmo-face" data-mood="awake">
        <div class="eyes"><span class="eye l"></span><span class="eye r"></span></div>
        <span class="mouth"></span>
      </div>
      <div id="chatlog" class="chatlog"></div>
      <form id="chatform">
        <input id="chatinput" autocomplete="off" placeholder="talk to somnus…" />
        <button type="submit">&#9654;</button>
      </form>
    </div>
    <div class="bmo-controls">
      <div class="dpad"></div>
      <div class="bmo-buttons">
        <span class="btn green"></span><span class="btn red"></span>
        <span class="btn blue"></span><span class="btn yellow"></span>
      </div>
    </div>
  </div>
  <div class="bmo-legs">
    <div class="leg"></div>
    <div class="leg"></div>
  </div>
  <div class="bmo-label">SOMNUS</div>
</div>

<div id="hint">drag titlebars · corner to resize · dblclick to focus · click void to release</div>
<button id="reset">reset layout</button>

<script>
const $ = (s,r=document)=>r.querySelector(s);
const stage = $('#stage');

// ===================== WINDOWS =====================
const WINDOWS = [
  { id:'memory',    title:'memory',    sub:'facts',     accent:'#d3869b', api:'/api/memory',      render:renderMemory },
  { id:'episodes',  title:'episodes',  sub:'dialogue',  accent:'#83a598', api:'/api/episodes',    render:renderEpisodes },
  { id:'sessions',  title:'sessions',  sub:'cc.sh',     accent:'#b8bb26', api:'/api/cc-sessions', render:renderSessions },
  { id:'spend',     title:'spend',     sub:'usd',       accent:'#fabd2f', api:'/api/spend',       render:renderSpend },
  { id:'scheduler', title:'scheduler', sub:'dream · gaps · brief', accent:'#fe8019', api:'/api/scheduler', render:renderScheduler },
];
const els = {};
let zTop = 10;
let focusedId = null;

function defaultLayout(){
  const W = innerWidth, H = innerHeight, cx = W/2, cy = H/2;
  const ww = Math.max(240, Math.min(340, W*0.28)), wh = Math.max(180, Math.min(260, H*0.32));
  const R = Math.min(W,H)*0.40 + 80;
  const order = ['scheduler','memory','episodes','sessions','spend'];
  const layout = {};
  order.forEach((id,i)=>{
    const a = (-Math.PI/2) + i*(2*Math.PI/order.length);
    let x = cx + Math.cos(a)*R - ww/2;
    let y = cy + Math.sin(a)*R*0.78 - wh/2;
    x = Math.max(12, Math.min(W-ww-12, x));
    y = Math.max(12, Math.min(H-wh-12, y));
    layout[id] = { x, y, w:ww, h:wh };
  });
  return layout;
}
function loadLayout(){
  try { const s = JSON.parse(localStorage.getItem('somnus.layout')||'null'); if(s) return s; } catch{}
  return defaultLayout();
}
function saveLayout(){
  const out = {};
  for(const id in els){ const e = els[id]; out[id] = {x:e.x,y:e.y,w:e.w,h:e.h}; }
  localStorage.setItem('somnus.layout', JSON.stringify(out));
}
function place(e){ e.win.style.transform = `translate(${e.x}px,${e.y}px)`; e.win.style.width=e.w+'px'; e.win.style.height=e.h+'px'; }

function makeWindow(def, geo){
  const win = document.createElement('div');
  win.className = 'win'; win.style.setProperty('--accent', def.accent);
  win.innerHTML = `
    <div class="bar">
      <div class="dots"><span class="dot"></span><span class="dot dot2"></span><span class="dot dot3"></span></div>
      <span class="ttl">${def.title} <small>${def.sub}</small></span>
    </div>
    <div class="body"><div class="empty">connecting…</div></div>
    <div class="grip"></div>`;
  stage.appendChild(win);
  const e = { win, body:$('.body',win), def, x:geo.x, y:geo.y, w:geo.w, h:geo.h };
  els[def.id] = e; place(e); raise(def.id);

  const bar = $('.bar',win), grip = $('.grip',win);
  win.addEventListener('pointerdown', ()=>raise(def.id));
  bar.addEventListener('dblclick', ()=> focusedId===def.id ? releaseFocus() : setFocus(def.id));

  bar.addEventListener('pointerdown', ev=>{
    if(ev.target.closest('.grip')) return;
    ev.preventDefault(); bar.setPointerCapture(ev.pointerId);
    const sx=ev.clientX, sy=ev.clientY, ox=e.x, oy=e.y;
    const move = m=>{
      e.x = Math.max(-e.w*0.6, Math.min(innerWidth-40, ox + (m.clientX-sx)));
      e.y = Math.max(0, Math.min(innerHeight-40, oy + (m.clientY-sy)));
      place(e);
    };
    const up = ()=>{ bar.removeEventListener('pointermove',move); window.removeEventListener('pointerup',up); saveLayout(); };
    bar.addEventListener('pointermove',move); window.addEventListener('pointerup',up);
  });
  grip.addEventListener('pointerdown', ev=>{
    ev.preventDefault(); ev.stopPropagation(); grip.setPointerCapture(ev.pointerId);
    const sx=ev.clientX, sy=ev.clientY, ow=e.w, oh=e.h;
    const move = m=>{ e.w=Math.max(220, ow+(m.clientX-sx)); e.h=Math.max(120, oh+(m.clientY-sy)); place(e); };
    const up = ()=>{ grip.removeEventListener('pointermove',move); window.removeEventListener('pointerup',up); saveLayout(); };
    grip.addEventListener('pointermove',move); window.addEventListener('pointerup',up);
  });
  return e;
}
function raise(id){ els[id].win.style.zIndex = ++zTop; }

function setFocus(id){
  focusedId = id;
  for(const k in els){ els[k].win.classList.toggle('dim', k!==id); els[k].win.classList.toggle('focused', k===id); }
  const e = els[id];
  e._restore = {x:e.x,y:e.y,w:e.w,h:e.h};
  e.w = Math.min(innerWidth*0.6, 700); e.h = Math.min(innerHeight*0.70, 580);
  e.x = (innerWidth-e.w)/2; e.y = (innerHeight-e.h)/2;
  e.win.style.transition='transform .35s ease, width .35s, height .35s';
  place(e); raise(id);
  setTimeout(()=>{ if(e.win) e.win.style.transition=''; },380);
}
function releaseFocus(){
  if(!focusedId) return;
  const e = els[focusedId];
  if(e && e._restore){ Object.assign(e, e._restore); delete e._restore;
    e.win.style.transition='transform .35s ease, width .35s, height .35s'; place(e);
    setTimeout(()=>{ if(e.win) e.win.style.transition=''; },380); }
  for(const k in els){ els[k].win.classList.remove('dim','focused'); }
  focusedId=null;
}
stage.addEventListener('pointerdown', ev=>{ if(ev.target===stage) releaseFocus(); });

// =================== rendering ===================
function timeAgo(ts){ if(!ts) return ''; const s=(Date.now()-new Date(ts).getTime())/1000;
  if(s<60) return Math.floor(s)+'s'; if(s<3600) return Math.floor(s/60)+'m';
  if(s<86400) return Math.floor(s/3600)+'h'; return Math.floor(s/86400)+'d'; }
function esc(t){ return (t==null?'':t.toString()).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

function renderMemory(d){
  if(d.error) return `<div class="err">${esc(d.error)}</div>`;
  const head = `<div style="display:flex;gap:16px;align-items:baseline;margin-bottom:8px">
    <div><span class="big">${d.total}</span><div class="sub">facts held</div></div>
    <div><span class="big" style="font-size:20px">+${d.added_24h}</span><div class="sub">last 24h</div></div></div>`;
  const rows = (d.recent||[]).map(f=>`<div class="row">
    <span class="tag ${f.kind==='persona'?'v':''}">${esc(f.kind)}</span> ${esc(f.claim)}
    <div class="meta">${esc(f.source||'')} · conf ${(f.confidence==null?'':f.confidence)} · ${timeAgo(f.created_at)} ago · ${esc(f.visibility||'')}</div></div>`).join('');
  return head + (rows||'<div class="empty">no facts yet</div>');
}
function renderEpisodes(d){
  if(d.error) return `<div class="err">${esc(d.error)}</div>`;
  if(!d.length) return '<div class="empty">no episodes yet</div>';
  return d.map(e=>`<div class="row"><span class="tag ${e.role==='assistant'?'v':''}">${esc(e.role)}</span>
    <span class="meta">${esc(e.source||'')}${e.tool_name?' · '+esc(e.tool_name):''} · ${timeAgo(e.created_at)} ago</span>
    <div>${esc(e.content)}</div></div>`).join('');
}
function renderSessions(d){
  if(d.error) return `<div class="err">${esc(d.error)}</div>`;
  if(!d.length) return '<div class="empty">no coding sessions yet</div>';
  return d.map(s=>`<div class="row"><b style="color:var(--fg)">${esc(s.title||(s.session_id||'session').slice(0,8))}</b>
    <span class="meta"> · ${timeAgo(s.ingested_at)} ago</span>
    ${s.task_prompt?`<div class="meta">&#9658; ${esc(s.task_prompt)}</div>`:''}
    ${s.result_summary?`<div>${esc(s.result_summary)}</div>`:''}</div>`).join('');
}
function renderSpend(d){
  if(d.error) return `<div class="err">${esc(d.error)}</div>`;
  const today = (d.today||0);
  const wk = d.week||[];
  const max = Math.max(0.0001, ...wk.map(w=>w.cost));
  const bars = wk.map(w=>`<div class="b" style="height:${Math.max(2,(w.cost/max)*100)}%" title="$${w.cost.toFixed(2)}">
    <span>${new Date(w.day).toLocaleDateString(undefined,{weekday:'short'}).slice(0,2)}</span></div>`).join('');
  return `<div><span class="big">$${today.toFixed(2)}</span><div class="sub">spent today (cap $10)</div></div>
    <div class="bars">${bars||'<div class="empty">no spend logged</div>'}</div>
    <div class="sub" style="margin-top:20px">7-day API spend</div>`;
}
const CRON_LABEL = { 'dream-cycle':'04:00 nightly','morning-briefing':'08:00 daily','gap-analysis':'after dream',
  'cc-spend-sweep':'every 10m','cc-ingest-sweep':'every 15m' };
let dreaming=false;
function renderScheduler(d){
  if(!Array.isArray(d)) return `<div class="err">scheduler unavailable</div>`;
  const dream = d.find(j=>j.name==='dream-cycle');
  dreaming = !!(dream && (dream.state==='active' || dream.state==='created'));
  return d.map(j=>{
    const st = j.state||'null';
    const when = j.completedon? timeAgo(j.completedon)+' ago' : (j.startedon? 'running…':'—');
    return `<div class="row" style="display:flex;align-items:center;gap:8px">
      <span style="flex:1">${esc(j.name)}<div class="meta">${CRON_LABEL[j.name]||esc(j.cron||'')}</div></span>
      <span class="state-badge s-${st}">${esc(st)}</span>
      <span class="meta" style="width:60px;text-align:right">${when}</span></div>`;
  }).join('');
}

// =================== polling ===================
async function poll(def){
  const e = els[def.id]; if(!e) return;
  try { const r = await fetch(def.api, {cache:'no-store'}); const d = await r.json();
    e.body.innerHTML = def.render(d);
  } catch(err){ e.body.innerHTML = `<div class="err">offline — ${esc(err.message||err)}</div>`; }
}
function pollAll(){ WINDOWS.forEach(poll); setTimeout(updateBmoState, 200); }
function updateBmoState(){
  const hr = new Date().getHours();
  const currentMood = face.dataset.mood;
  // only update ambient mood if not in an active chat state
  if(currentMood !== 'thinking' && currentMood !== 'happy'){
    if(dreaming){
      setMood('dreaming');
    } else if(hr >= 0 && hr < 6){
      setMood('resting');
    } else if(currentMood === 'dreaming' || currentMood === 'resting'){
      setMood('awake');
    }
  }
}

// ===================== CHAT CLIENT =====================
const TOKEN_KEY = 'somnus.chatToken';
const log = document.getElementById('chatlog');
const form = document.getElementById('chatform');
const input = document.getElementById('chatinput');
const face = document.getElementById('bmo-face');

function addMsg(who, text){
  const d = document.createElement('div');
  d.className = 'msg ' + who;            // who: 'you' | 'somnus' | 'sys'
  d.textContent = text;
  log.appendChild(d); log.scrollTop = log.scrollHeight;
  return d;
}
function setMood(m){ face.dataset.mood = m; }

async function loadHistory(){
  try {
    const r = await fetch('/api/chat/history', {cache:'no-store'});
    const rows = await r.json();
    for (const row of rows){
      addMsg('you', row.prompt);
      if (row.reply) addMsg(row.status === 'error' ? 'sys' : 'somnus', row.reply);
    }
  } catch {}
}

async function send(text){
  addMsg('you', text); setMood('thinking');
  const headers = {'content-type':'application/json'};
  const tok = localStorage.getItem(TOKEN_KEY);
  if (tok) headers['x-somnus-token'] = tok;
  let res;
  try { res = await fetch('/api/chat', {method:'POST', headers, body:JSON.stringify({text})}); }
  catch(e){ setMood('awake'); return addMsg('sys', 'offline: '+e.message); }
  if (res.status === 401){
    setMood('awake');
    const t = prompt('Somnus chat is locked. Enter the chat token:');
    if (t){ localStorage.setItem(TOKEN_KEY, t); return send(text); }   // retry once
    return addMsg('sys', 'locked — token required to send.');
  }
  if (!res.ok){ setMood('awake'); return addMsg('sys', 'error: '+(await res.text())); }
  const { id } = await res.json();
  pollReply(id);
}

async function pollReply(id, tries=0){
  if (tries > 60){ setMood('awake'); return addMsg('sys','(timed out waiting for Somnus)'); }
  try {
    const r = await fetch('/api/chat/'+id, {cache:'no-store'});
    const d = await r.json();
    if (d.status === 'done'){ setMood('happy'); addMsg('somnus', d.reply); setTimeout(()=>setMood('awake'),3000); return; }
    if (d.status === 'error'){ setMood('awake'); addMsg('sys', d.reply || 'turn failed'); return; }
  } catch {}
  setTimeout(()=>pollReply(id, tries+1), 1500);   // pending/running
}

form.addEventListener('submit', e=>{
  e.preventDefault();
  const text = input.value.trim(); if(!text) return;
  input.value=''; send(text);
});
loadHistory();

// =================== boot ===================
function boot(){
  const layout = loadLayout(), dflt = defaultLayout();
  WINDOWS.forEach(def => makeWindow(def, layout[def.id] || dflt[def.id]));
  pollAll(); setInterval(pollAll, 8000);
}
$('#reset').addEventListener('click', ()=>{ localStorage.removeItem('somnus.layout');
  const l=defaultLayout(); for(const id in els){ Object.assign(els[id], l[id]); place(els[id]); } releaseFocus(); });
let rt; addEventListener('resize', ()=>{ clearTimeout(rt); rt=setTimeout(()=>{ const l=defaultLayout(); for(const id in els){ if(!els[id]._restore){ Object.assign(els[id], l[id]); place(els[id]); } } },200); });
boot();
</script>
