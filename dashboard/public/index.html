<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>Somnus · console</title>
<style>
:root{
  --bg:#282828; --bg-h:#1d2021; --bg-s:#32302f; --fg:#ebdbb2; --gray:#928374;
  --red:#fb4934; --green:#b8bb26; --yellow:#fabd2f; --blue:#83a598;
  --purple:#d3869b; --aqua:#8ec07c; --orange:#fe8019;
  --mono: ui-monospace,"SF Mono","JetBrains Mono",Menlo,Consolas,monospace;
}

*{ box-sizing:border-box; }
html,body{ margin:0; height:100%; overflow:hidden;
  background:var(--bg); color:var(--fg);
  font-family:var(--mono); font-size:13px;
  -webkit-font-smoothing:none; image-rendering:pixelated;
  user-select:none; }

/* scanline overlay */
body::after{
  content:''; position:fixed; inset:0; pointer-events:none; z-index:9999;
  background:repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.08) 2px,
    rgba(0,0,0,0.08) 4px
  );
}

#stage{ position:fixed; inset:0; z-index:2; }

/* ===================== BMO ===================== */
#bmo{
  position:fixed; left:50%; top:50%;
  transform:translate(-50%,-50%);
  z-index:3;
  width:220px;
  display:flex; flex-direction:column; align-items:center;
  gap:0;
  cursor:grab; touch-action:none;
}
#bmo.dragging{ cursor:grabbing; }
/* legs flail while BMO is being dragged */
#bmo.dragging .leg{ transform-origin:top center; animation:legwave .35s ease-in-out infinite; }
#bmo.dragging .leg:nth-child(2){ animation-delay:.17s; }
#bmo.dragging .arm{ transform-origin:top center; animation:armwave .4s ease-in-out infinite; }
#bmo.dragging .arm:nth-child(2){ animation-delay:.2s; }
@keyframes legwave{ 0%,100%{ transform:rotate(-22deg); } 50%{ transform:rotate(22deg); } }
@keyframes armwave{ 0%,100%{ transform:rotate(14deg); } 50%{ transform:rotate(-14deg); } }

/* body */
#bmo .bmo-body{
  position:relative;
  width:200px; height:240px;
  background:var(--aqua);
  border:3px solid var(--bg-h);
  box-shadow:4px 4px 0 var(--bg-h);
  border-radius:18px 18px 12px 12px;
  display:flex; flex-direction:column; align-items:center;
  padding:8px 8px 6px;
}

/* speaker dots */
#bmo .bmo-body::before{
  content:'· · ·';
  position:absolute; top:8px; right:14px;
  font-size:9px; letter-spacing:3px;
  color:rgba(0,0,0,0.3);
}

/* screen */
.bmo-screen{
  width:174px; height:162px;
  background:var(--bg-h);
  border:3px solid var(--bg-h);
  box-shadow:inset 2px 2px 0 #000, 2px 2px 0 rgba(0,0,0,0.5);
  border-radius:4px;
  display:flex; flex-direction:column;
  overflow:hidden;
  position:relative;
}

/* face layer */
#bmo-face{
  position:absolute; inset:0;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  gap:6px;
  pointer-events:none;
  z-index:1;
  transition:opacity 0.3s;
}
#bmo-face.hidden{ opacity:0; }

#bmo-face .eye{
  display:inline-block;
  width:10px; height:10px;
  background:var(--aqua);
  border:2px solid var(--bg-h);
  border-radius:2px;
}
#bmo-face .eyes{ display:flex; gap:18px; }

#bmo-face .mouth{
  width:28px; height:6px;
  background:var(--aqua);
  border:2px solid var(--bg-h);
  border-radius:2px;
}

/* awake: slow blink */
#bmo-face[data-mood="awake"] .eye{
  animation:blink 4s ease-in-out infinite;
}
@keyframes blink{
  0%,90%,100%{ transform:scaleY(1); }
  95%{ transform:scaleY(0.1); }
}

/* thinking: eye dots, pulse */
#bmo-face[data-mood="thinking"] .eye{
  background:var(--yellow);
  animation:think-pulse 0.5s ease-in-out infinite alternate;
}
#bmo-face[data-mood="thinking"] .mouth{
  background:var(--yellow);
}
@keyframes think-pulse{
  from{ opacity:0.5; }
  to{ opacity:1; }
}

/* happy: curved mouth */
#bmo-face[data-mood="happy"] .eye{
  background:var(--green);
  transform:scaleY(0.6);
}
#bmo-face[data-mood="happy"] .mouth{
  background:var(--green);
  border-radius:0 0 6px 6px;
  height:8px;
}

/* dreaming: closed eyes, slow breath */
#bmo-face[data-mood="dreaming"] .eye{
  background:var(--purple);
  transform:scaleY(0.15);
}
#bmo-face[data-mood="dreaming"] .mouth{
  background:var(--purple);
  width:16px;
}
#bmo-face[data-mood="dreaming"]{
  animation:dream-breath 3s ease-in-out infinite;
}
@keyframes dream-breath{
  0%,100%{ transform:scale(1); }
  50%{ transform:scale(1.04); }
}

/* resting: dim, still */
#bmo-face[data-mood="resting"] .eye{
  background:var(--gray);
  transform:scaleY(0.15);
}
#bmo-face[data-mood="resting"] .mouth{
  background:var(--gray);
  width:20px;
}

/* chat log + form inside screen */
#chatlog{
  position:absolute; inset:0 0 34px 0;
  overflow-y:auto; overflow-x:hidden;
  padding:5px 6px;
  display:flex; flex-direction:column; gap:3px;
  scrollbar-width:thin; scrollbar-color:var(--gray) transparent;
  z-index:2;
}
#chatlog .msg{
  font-size:10px; line-height:1.4; word-break:break-word;
  padding:2px 4px;
  border:1px solid transparent;
  max-width:100%;
}
#chatlog .msg.you{
  color:var(--yellow); border-color:rgba(250,189,47,0.3);
  align-self:flex-end; text-align:right;
  background:rgba(250,189,47,0.07);
}
#chatlog .msg.somnus{
  color:var(--aqua); border-color:rgba(142,192,124,0.3);
  align-self:flex-start;
  background:rgba(142,192,124,0.07);
}
#chatlog .msg.sys{
  color:var(--gray); font-style:italic;
  align-self:center; font-size:9px;
}

#chatform{
  position:absolute; bottom:0; left:0; right:0; height:34px;
  display:flex; border-top:2px solid var(--bg-s);
  z-index:2; background:var(--bg);
}
#chatinput{
  flex:1; background:transparent; border:none; outline:none;
  color:var(--fg); font-family:var(--mono); font-size:10px;
  padding:0 6px; letter-spacing:0.03em;
}
#chatinput::placeholder{ color:var(--gray); }
#chatform button{
  background:none; border:none; border-left:2px solid var(--bg-s);
  color:var(--green); cursor:pointer; padding:0 8px;
  font-size:11px; font-family:var(--mono);
  transition:color 0.1s;
}
#chatform button:hover{ color:var(--yellow); }

/* BMO controls bar */
.bmo-controls{
  width:174px;
  display:flex; align-items:center; justify-content:space-between;
  margin-top:6px;
  padding:0 2px;
}

.dpad{
  display:grid; grid-template-columns:14px 14px 14px; grid-template-rows:14px 14px 14px;
  gap:1px;
}
.dpad::before{
  content:'';
  display:block;
  grid-column:1/4; grid-row:1/4;
  background:
    linear-gradient(var(--bg-h) 0, var(--bg-h) 100%) center / 14px 42px no-repeat,
    linear-gradient(var(--bg-h) 0, var(--bg-h) 100%) center / 42px 14px no-repeat;
  border:2px solid var(--bg-h);
  box-shadow:1px 1px 0 var(--bg-h);
}

.bmo-buttons{
  display:grid; grid-template-columns:14px 14px; gap:4px;
}
.btn{
  display:block; width:14px; height:14px; border-radius:50%;
  border:2px solid var(--bg-h);
  box-shadow:1px 1px 0 var(--bg-h);
}
.btn.green{ background:var(--green); }
.btn.red{ background:var(--red); }
.btn.blue{ background:var(--blue); }
.btn.yellow{ background:var(--yellow); }

/* arms/legs */
#bmo .bmo-arms{
  position:absolute;
  top:60px; left:-14px; right:-14px;
  display:flex; justify-content:space-between;
  pointer-events:none;
}
.arm{
  width:12px; height:50px;
  background:var(--aqua);
  border:3px solid var(--bg-h);
  box-shadow:3px 3px 0 var(--bg-h);
  border-radius:4px;
}
#bmo .bmo-legs{
  display:flex; gap:18px; margin-top:4px;
}
.leg{
  width:22px; height:20px;
  background:var(--aqua);
  border:3px solid var(--bg-h);
  box-shadow:3px 3px 0 var(--bg-h);
  border-radius:0 0 6px 6px;
}

/* SOMNUS wordmark engraved on the body, between the controls */
#bmo .bmo-name{
  flex:1; text-align:center;
  font-size:11px; font-weight:bold; letter-spacing:0.28em;
  color:var(--bg-h); text-transform:uppercase;
  text-shadow:0 1px 0 rgba(255,255,255,0.15);
}

/* ===================== WINDOWS ===================== */
.win{
  position:absolute; min-width:220px; min-height:120px; width:320px; height:240px;
  background:var(--bg-s);
  border:3px solid var(--bg-h);
  box-shadow:4px 4px 0 var(--bg-h);
  display:flex; flex-direction:column; overflow:hidden;
  opacity:1; top:0; left:0;
}
.win.dim{ opacity:0.3; filter:saturate(0.4); }
/* BMO recedes when a window is focused */
#bmo{ transition:opacity .35s ease, filter .35s ease; }
#bmo.bg{ opacity:0.22; filter:saturate(0.4) blur(1px); pointer-events:none; }
.win.focused{ box-shadow:4px 4px 0 var(--accent, var(--blue)); z-index:100; opacity:1; }

.win .bar{
  display:flex; align-items:center; gap:6px; padding:5px 8px;
  cursor:grab; background:var(--bg-h);
  border-bottom:3px solid var(--bg-h);
  flex:0 0 auto; touch-action:none;
}
.win .bar:active{ cursor:grabbing; }

.win .dots{ display:flex; gap:4px; }
.win .dot{
  width:8px; height:8px;
  background:var(--accent, var(--blue));
  border:2px solid var(--bg-h);
  box-shadow:1px 1px 0 var(--bg-h);
  flex:0 0 auto;
}
.win .dot2{ background:var(--bg); }
.win .dot3{ background:var(--bg-s); }

.win .ttl{
  letter-spacing:0.18em; text-transform:uppercase;
  font-size:10px; color:var(--fg); flex:1;
}
.win .ttl small{ color:var(--gray); letter-spacing:0.04em; text-transform:none; }

.win .body{
  flex:1; overflow:auto; padding:8px 10px; user-select:text;
  scrollbar-width:thin; scrollbar-color:var(--gray) transparent;
}
.win .body::-webkit-scrollbar{ width:5px; }
.win .body::-webkit-scrollbar-thumb{ background:var(--gray); border-radius:0; }

.graph-canvas{ display:block; cursor:grab; touch-action:none; }
.graph-legend{ position:absolute; bottom:4px; left:6px; display:flex; flex-wrap:wrap; gap:6px; font-size:9px; color:var(--gray); pointer-events:none; z-index:3; }
.graph-legend span{ display:flex; align-items:center; gap:3px; }
.graph-legend i{ width:8px; height:8px; display:inline-block; }
.graph-legend .graph-refresh{ pointer-events:auto; cursor:pointer; color:#ebdbb2; font-size:12px; }
.graph-pop{ position:absolute; width:180px; max-height:72%; overflow:auto; background:#282828; border:2px solid var(--accent); padding:6px 8px; font-size:11px; z-index:5; box-shadow:3px 3px 0 #1d2021; }
.graph-pop .gp-x{ position:absolute; top:2px; right:6px; cursor:pointer; color:var(--gray); }
.graph-pop .gp-ttl{ color:#ebdbb2; font-weight:bold; padding-right:14px; word-break:break-word; }
.graph-pop .gp-type{ color:var(--gray); font-size:9px; margin:2px 0 4px; }
.graph-pop .gp-truth{ color:#d5c4a1; margin-bottom:4px; }
.graph-pop .gp-link{ cursor:pointer; color:#83a598; padding:1px 0; }
.graph-pop .gp-link:hover{ color:#8ec07c; }

.win .grip{
  position:absolute; right:0; bottom:0; width:14px; height:14px;
  cursor:nwse-resize; touch-action:none;
  background:linear-gradient(135deg, transparent 50%, var(--gray) 50%, var(--gray) 62%, transparent 62%, transparent 74%, var(--gray) 74%);
}

/* content bits */
.row{
  padding:5px 0;
  border-bottom:1px solid var(--bg-h);
  line-height:1.45;
}
.row:last-child{ border-bottom:0; }
.tag{
  display:inline-block; padding:1px 5px;
  font-size:9px; letter-spacing:0.05em;
  background:rgba(131,165,152,0.15); color:var(--blue);
  border:1px solid var(--blue);
}
.tag.v{ background:rgba(211,134,155,0.15); color:var(--purple); border-color:var(--purple); }
.meta{ color:var(--gray); font-size:10px; }
.big{ font-size:32px; color:var(--fg); letter-spacing:0.02em; }
.sub{ color:var(--gray); font-size:10px; margin-top:2px; }
.bars{ display:flex; align-items:flex-end; gap:4px; height:60px; margin-top:12px; }
.bars .b{
  flex:1; background:var(--blue);
  min-height:2px; position:relative;
}
.bars .b span{
  position:absolute; bottom:-14px; left:0; right:0;
  text-align:center; font-size:9px; color:var(--gray);
}
.state-badge{
  font-size:9px; letter-spacing:0.1em; text-transform:uppercase;
  padding:1px 5px; border:1px solid;
}
.s-completed{ color:var(--green); border-color:var(--green); }
.s-active,.s-created{ color:var(--blue); border-color:var(--blue); }
.s-failed{ color:var(--red); border-color:var(--red); }
.s-null{ color:var(--gray); border-color:var(--gray); }
.empty{ color:var(--gray); font-style:italic; padding:6px 0; }
.err{ color:var(--red); }

#hint{
  position:fixed; left:12px; bottom:10px; z-index:4;
  color:var(--gray); font-size:9px; letter-spacing:0.1em; pointer-events:none;
}
#reset{
  position:fixed; right:12px; bottom:10px; z-index:4;
  color:var(--gray); font-size:9px; letter-spacing:0.1em;
  cursor:pointer; background:none;
  border:2px solid var(--bg-h);
  box-shadow:2px 2px 0 var(--bg-h);
  padding:3px 8px; font-family:var(--mono);
}
#reset:hover{ color:var(--yellow); border-color:var(--yellow); }

@media (prefers-reduced-motion: reduce){
  #bmo-face .eye, #bmo-face{ animation:none !important; }
}
</style>
</head>
<body>
<div id="stage"></div>

<!-- BMO -->
<div id="bmo">
  <div class="bmo-body">
    <div class="bmo-arms">
      <div class="arm"></div>
      <div class="arm" style="box-shadow:-3px 3px 0 var(--bg-h)"></div>
    </div>
    <div class="bmo-screen">
      <div id="bmo-face" data-mood="awake">
        <div class="eyes"><span class="eye l"></span><span class="eye r"></span></div>
        <span class="mouth"></span>
      </div>
      <div id="chatlog" class="chatlog"></div>
      <form id="chatform">
        <input id="chatinput" autocomplete="off" placeholder="talk to somnus…" />
        <button type="submit">&#9654;</button>
      </form>
    </div>
    <div class="bmo-controls">
      <div class="dpad"></div>
      <div class="bmo-name">SOMNUS</div>
      <div class="bmo-buttons">
        <span class="btn green"></span><span class="btn red"></span>
        <span class="btn blue"></span><span class="btn yellow"></span>
      </div>
    </div>
  </div>
  <div class="bmo-legs">
    <div class="leg"></div>
    <div class="leg"></div>
  </div>
</div>

<div id="hint">drag titlebars · corner to resize · dblclick to focus · click void to release</div>
<button id="reset">reset layout</button>

<script>
const $ = (s,r=document)=>r.querySelector(s);
const stage = $('#stage');

// ===================== WINDOWS =====================
const WINDOWS = [
  { id:'memory',    title:'memory',    sub:'facts',     accent:'#d3869b', api:'/api/memory',      render:renderMemory },
  { id:'episodes',  title:'episodes',  sub:'dialogue',  accent:'#83a598', api:'/api/episodes',    render:renderEpisodes },
  { id:'sessions',  title:'sessions',  sub:'cc.sh',     accent:'#b8bb26', api:'/api/cc-sessions', render:renderSessions },
  { id:'spend',     title:'spend',     sub:'usd',       accent:'#fabd2f', api:'/api/spend',       render:renderSpend },
  { id:'scheduler', title:'scheduler', sub:'dream · gaps · brief', accent:'#fe8019', api:'/api/scheduler', render:renderScheduler },
  { id:'graph',     title:'graph',     sub:'pages · edges', accent:'#8ec07c', custom:true },
];
const els = {};
let zTop = 10;
let focusedId = null;

function defaultLayout(){
  const W = innerWidth, H = innerHeight, cx = W/2, cy = H/2;
  const ww = Math.max(240, Math.min(340, W*0.28)), wh = Math.max(180, Math.min(260, H*0.32));
  const R = Math.min(W,H)*0.40 + 80;
  const order = ['scheduler','graph','memory','episodes','sessions','spend'];
  const layout = {};
  order.forEach((id,i)=>{
    const a = (-Math.PI/2) + i*(2*Math.PI/order.length);
    let x = cx + Math.cos(a)*R - ww/2;
    let y = cy + Math.sin(a)*R*0.78 - wh/2;
    x = Math.max(12, Math.min(W-ww-12, x));
    y = Math.max(12, Math.min(H-wh-12, y));
    layout[id] = { x, y, w:ww, h:wh };
  });
  return layout;
}
function loadLayout(){
  try { const s = JSON.parse(localStorage.getItem('somnus.layout')||'null'); if(s) return s; } catch{}
  return defaultLayout();
}
function saveLayout(){
  const out = {};
  for(const id in els){ const e = els[id]; out[id] = {x:e.x,y:e.y,w:e.w,h:e.h}; }
  localStorage.setItem('somnus.layout', JSON.stringify(out));
}
function place(e){ e.win.style.transform = `translate(${e.x}px,${e.y}px)`; e.win.style.width=e.w+'px'; e.win.style.height=e.h+'px'; }

function makeWindow(def, geo){
  const win = document.createElement('div');
  win.className = 'win'; win.style.setProperty('--accent', def.accent);
  win.innerHTML = `
    <div class="bar">
      <div class="dots"><span class="dot"></span><span class="dot dot2"></span><span class="dot dot3"></span></div>
      <span class="ttl">${def.title} <small>${def.sub}</small></span>
    </div>
    <div class="body"><div class="empty">connecting…</div></div>
    <div class="grip"></div>`;
  stage.appendChild(win);
  const e = { win, body:$('.body',win), def, x:geo.x, y:geo.y, w:geo.w, h:geo.h };
  els[def.id] = e; place(e); raise(def.id);

  const bar = $('.bar',win), grip = $('.grip',win);
  win.addEventListener('pointerdown', ()=>raise(def.id));
  bar.addEventListener('dblclick', ()=> focusedId===def.id ? releaseFocus() : setFocus(def.id));

  bar.addEventListener('pointerdown', ev=>{
    if(ev.target.closest('.grip')) return;
    ev.preventDefault(); bar.setPointerCapture(ev.pointerId);
    const sx=ev.clientX, sy=ev.clientY, ox=e.x, oy=e.y;
    const move = m=>{
      e.x = Math.max(-e.w*0.6, Math.min(innerWidth-40, ox + (m.clientX-sx)));
      e.y = Math.max(0, Math.min(innerHeight-40, oy + (m.clientY-sy)));
      place(e);
    };
    const up = ()=>{ bar.removeEventListener('pointermove',move); window.removeEventListener('pointerup',up); saveLayout(); };
    bar.addEventListener('pointermove',move); window.addEventListener('pointerup',up);
  });
  grip.addEventListener('pointerdown', ev=>{
    ev.preventDefault(); ev.stopPropagation(); grip.setPointerCapture(ev.pointerId);
    const sx=ev.clientX, sy=ev.clientY, ow=e.w, oh=e.h;
    const move = m=>{ e.w=Math.max(220, ow+(m.clientX-sx)); e.h=Math.max(120, oh+(m.clientY-sy)); place(e); };
    const up = ()=>{ grip.removeEventListener('pointermove',move); window.removeEventListener('pointerup',up); saveLayout(); };
    grip.addEventListener('pointermove',move); window.addEventListener('pointerup',up);
  });
  return e;
}
function raise(id){ els[id].win.style.zIndex = ++zTop; }

const ANIM_MS = 380;
function animPlace(e){ e.win.style.transition='transform .35s ease, width .35s, height .35s'; place(e); setTimeout(()=>{ if(e.win) e.win.style.transition=''; }, ANIM_MS); }

function setFocus(id){
  focusedId = id;
  for(const k in els){ els[k].win.classList.toggle('dim', k!==id); els[k].win.classList.toggle('focused', k===id); }
  bmo.classList.add('bg');
  const e = els[id];
  e._restore = {x:e.x,y:e.y,w:e.w,h:e.h};
  e.w = Math.min(innerWidth*0.6, 700); e.h = Math.min(innerHeight*0.70, 580);
  e.x = (innerWidth-e.w)/2; e.y = (innerHeight-e.h)/2;
  animPlace(e); raise(id);
}
function releaseFocus(){
  if(!focusedId) return;
  const e = els[focusedId];
  if(e && e._restore){ Object.assign(e, e._restore); delete e._restore;
    animPlace(e); }
  for(const k in els){ els[k].win.classList.remove('dim','focused'); }
  bmo.classList.remove('bg');
  focusedId=null;
}
stage.addEventListener('pointerdown', ev=>{ if(ev.target===stage) releaseFocus(); });

// =================== rendering ===================
function timeAgo(ts){ if(!ts) return ''; const s=(Date.now()-new Date(ts).getTime())/1000;
  if(s<60) return Math.floor(s)+'s'; if(s<3600) return Math.floor(s/60)+'m';
  if(s<86400) return Math.floor(s/3600)+'h'; return Math.floor(s/86400)+'d'; }
function esc(t){ return (t==null?'':t.toString()).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

function renderMemory(d){
  if(d.error) return `<div class="err">${esc(d.error)}</div>`;
  const head = `<div style="display:flex;gap:16px;align-items:baseline;margin-bottom:8px">
    <div><span class="big">${d.total}</span><div class="sub">facts held</div></div>
    <div><span class="big" style="font-size:20px">+${d.added_24h}</span><div class="sub">last 24h</div></div></div>`;
  const rows = (d.recent||[]).map(f=>`<div class="row">
    <span class="tag ${f.kind==='persona'?'v':''}">${esc(f.kind)}</span> ${esc(f.claim)}
    <div class="meta">${esc(f.source||'')} · conf ${(f.confidence==null?'':f.confidence)} · ${timeAgo(f.created_at)} ago · ${esc(f.visibility||'')}</div></div>`).join('');
  return head + (rows||'<div class="empty">no facts yet</div>');
}
function renderEpisodes(d){
  if(d.error) return `<div class="err">${esc(d.error)}</div>`;
  if(!d.length) return '<div class="empty">no episodes yet</div>';
  return d.map(e=>`<div class="row"><span class="tag ${e.role==='assistant'?'v':''}">${esc(e.role)}</span>
    <span class="meta">${esc(e.source||'')}${e.tool_name?' · '+esc(e.tool_name):''} · ${timeAgo(e.created_at)} ago</span>
    <div>${esc(e.content)}</div></div>`).join('');
}
function renderSessions(d){
  if(d.error) return `<div class="err">${esc(d.error)}</div>`;
  if(!d.length) return '<div class="empty">no coding sessions yet</div>';
  return d.map(s=>`<div class="row"><b style="color:var(--fg)">${esc(s.title||(s.session_id||'session').slice(0,8))}</b>
    <span class="meta"> · ${timeAgo(s.ingested_at)} ago</span>
    ${s.task_prompt?`<div class="meta">&#9658; ${esc(s.task_prompt)}</div>`:''}
    ${s.result_summary?`<div>${esc(s.result_summary)}</div>`:''}</div>`).join('');
}
function renderSpend(d){
  if(d.error) return `<div class="err">${esc(d.error)}</div>`;
  const today = (d.today||0);
  const wk = d.week||[];
  const max = Math.max(0.0001, ...wk.map(w=>w.cost));
  const bars = wk.map(w=>`<div class="b" style="height:${Math.max(2,(w.cost/max)*100)}%" title="$${w.cost.toFixed(2)}">
    <span>${new Date(w.day).toLocaleDateString(undefined,{weekday:'short'}).slice(0,2)}</span></div>`).join('');
  return `<div><span class="big">$${today.toFixed(2)}</span><div class="sub">spent today (cap $10)</div></div>
    <div class="bars">${bars||'<div class="empty">no spend logged</div>'}</div>
    <div class="sub" style="margin-top:20px">7-day API spend</div>`;
}
const CRON_LABEL = { 'dream-cycle':'04:00 nightly','morning-briefing':'08:00 daily','gap-analysis':'after dream',
  'cc-spend-sweep':'every 10m','cc-ingest-sweep':'every 15m' };
let dreaming=false;
function renderScheduler(d){
  if(!Array.isArray(d)) return `<div class="err">scheduler unavailable</div>`;
  const dream = d.find(j=>j.name==='dream-cycle');
  dreaming = !!(dream && (dream.state==='active' || dream.state==='created'));
  return d.map(j=>{
    const st = j.state||'null';
    const when = j.completedon? timeAgo(j.completedon)+' ago' : (j.startedon? 'running…':'—');
    return `<div class="row" style="display:flex;align-items:center;gap:8px">
      <span style="flex:1">${esc(j.name)}<div class="meta">${CRON_LABEL[j.name]||esc(j.cron||'')}</div></span>
      <span class="state-badge s-${st}">${esc(st)}</span>
      <span class="meta" style="width:60px;text-align:right">${when}</span></div>`;
  }).join('');
}

// =================== graph view ===================
const TYPE_COLOR = { person:'#fb4934', concept:'#8ec07c', meeting:'#fabd2f', note:'#83a598', daily:'#d3869b', email:'#fe8019' };
const TYPE_FALLBACK = '#a89984';

async function initGraph(e){
  if (e._graphCleanup) e._graphCleanup();
  e.body.style.padding = '0'; e.body.style.overflow = 'hidden'; e.body.style.position = 'relative';
  e.body.innerHTML = '';

  let nodes = [], links = [], byId = new Map();
  let raf = 0, alpha = 1, observer = null, popover = null;
  const cam = { x:0, y:0, scale:1 };
  let dragNode = null, panning = false, hoverNode = null, selectedId = null;

  const canvas = document.createElement('canvas');
  canvas.className = 'graph-canvas';
  const ctx = canvas.getContext('2d');

  const bw = () => e.body.clientWidth || 400;
  const bh = () => e.body.clientHeight || 300;
  function fit(){
    const w = bw(), h = bh(), dpr = window.devicePixelRatio || 1;
    canvas.width = w*dpr; canvas.height = h*dpr;
    canvas.style.width = w+'px'; canvas.style.height = h+'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);
  }
  const s2w = (sx,sy) => ({ x:(sx-cam.x)/cam.scale, y:(sy-cam.y)/cam.scale });
  const radius = n => 3 + Math.min(9, n.degree ?? 0);

  function neighborSet(node){
    const s = new Set([node]);
    for (const l of links){ if(l.source===node.id) s.add(byId.get(l.target)); if(l.target===node.id) s.add(byId.get(l.source)); }
    s.delete(undefined); return s;
  }

  function step(){
    const cx = bw()/2, cy = bh()/2;
    for (let i=0;i<nodes.length;i++){
      const a = nodes[i];
      for (let j=i+1;j<nodes.length;j++){
        const b = nodes[j];
        let dx = a.x-b.x, dy = a.y-b.y; const d2 = dx*dx+dy*dy || 0.01; const d = Math.sqrt(d2);
        const f = 600/d2; const fx=(dx/d)*f, fy=(dy/d)*f;
        a.vx += fx; a.vy += fy; b.vx -= fx; b.vy -= fy;
      }
    }
    for (const l of links){
      const a = byId.get(l.source), b = byId.get(l.target); if(!a||!b) continue;
      let dx = b.x-a.x, dy = b.y-a.y; const d = Math.sqrt(dx*dx+dy*dy) || 0.01;
      const f = (d-60)*0.02; const fx=(dx/d)*f, fy=(dy/d)*f;
      a.vx += fx; a.vy += fy; b.vx -= fx; b.vy -= fy;
    }
    for (const n of nodes){
      n.vx += (cx-n.x)*0.0015; n.vy += (cy-n.y)*0.0015;
      if (n===dragNode){ n.vx=0; n.vy=0; continue; }
      n.vx *= 0.85; n.vy *= 0.85;
      n.x += n.vx*alpha; n.y += n.vy*alpha;
    }
    alpha *= 0.992; if (alpha < 0.02) alpha = 0.02;
  }

  function draw(){
    ctx.clearRect(0,0,bw(),bh());
    ctx.save(); ctx.translate(cam.x,cam.y); ctx.scale(cam.scale,cam.scale);
    const hl = hoverNode ? neighborSet(hoverNode) : null;
    ctx.lineWidth = 1/cam.scale;
    for (const l of links){
      const a = byId.get(l.source), b = byId.get(l.target); if(!a||!b) continue;
      const on = hl && (a===hoverNode || b===hoverNode);
      ctx.strokeStyle = on ? 'rgba(235,219,178,0.6)' : 'rgba(168,153,132,0.18)';
      ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke();
    }
    for (const n of nodes){
      const r = radius(n), dim = hl && !hl.has(n);
      ctx.globalAlpha = dim ? 0.25 : 1;
      ctx.fillStyle = TYPE_COLOR[n.type] || TYPE_FALLBACK;
      ctx.fillRect(n.x-r, n.y-r, r*2, r*2);
      if (n.id===selectedId){ ctx.strokeStyle='#ebdbb2'; ctx.lineWidth=2/cam.scale; ctx.strokeRect(n.x-r-2,n.y-r-2,r*2+4,r*2+4); }
    }
    ctx.globalAlpha = 1;
    if (hl){
      ctx.fillStyle='#ebdbb2'; ctx.font=`${Math.max(9,11/cam.scale)}px monospace`;
      for (const n of hl){ if(n) ctx.fillText(n.title||n.slug, n.x+radius(n)+2, n.y+3); }
    }
    ctx.restore();
  }

  function loop(){
    if (!document.hidden){ if (alpha > 0.025) step(); draw(); }
    raf = requestAnimationFrame(loop);
  }

  function nodeAt(sx,sy){
    const w = s2w(sx,sy); let best=null, bestD=Infinity;
    for (const n of nodes){ const r=radius(n)+3; const dx=n.x-w.x, dy=n.y-w.y; const d=dx*dx+dy*dy; if(d<r*r && d<bestD){ best=n; bestD=d; } }
    return best;
  }

  canvas.addEventListener('pointermove', ev=>{
    const rect = canvas.getBoundingClientRect();
    const sx = ev.clientX-rect.left, sy = ev.clientY-rect.top;
    if (dragNode){ const w = s2w(sx,sy); dragNode.x=w.x; dragNode.y=w.y; alpha=Math.max(alpha,0.3); return; }
    if (panning){ cam.x += ev.movementX; cam.y += ev.movementY; return; }
    const hit = nodeAt(sx,sy);
    if (hit!==hoverNode){ hoverNode=hit; canvas.style.cursor = hit?'pointer':'grab'; }
  });
  let downX = 0, downY = 0;
  canvas.addEventListener('pointerdown', ev=>{
    canvas.setPointerCapture(ev.pointerId);
    downX = ev.clientX; downY = ev.clientY;
    const rect = canvas.getBoundingClientRect();
    const hit = nodeAt(ev.clientX-rect.left, ev.clientY-rect.top);
    if (hit){ dragNode = hit; } else { panning = true; canvas.style.cursor='grabbing'; }
  });
  canvas.addEventListener('pointerup', ev=>{
    const rect = canvas.getBoundingClientRect();
    const sx = ev.clientX-rect.left, sy = ev.clientY-rect.top;
    const moved = Math.hypot(ev.clientX-downX, ev.clientY-downY) > 4;
    if (dragNode && !moved && nodeAt(sx,sy)===dragNode) openPopover(dragNode, sx, sy);
    dragNode = null; panning = false; canvas.style.cursor='grab';
  });
  canvas.addEventListener('pointercancel', ()=>{ dragNode = null; panning = false; canvas.style.cursor='grab'; });
  canvas.addEventListener('wheel', ev=>{
    ev.preventDefault();
    const rect = canvas.getBoundingClientRect();
    const sx = ev.clientX-rect.left, sy = ev.clientY-rect.top;
    const before = s2w(sx,sy);
    cam.scale = Math.max(0.2, Math.min(4, cam.scale*(ev.deltaY<0 ? 1.1 : 1/1.1)));
    cam.x = sx - before.x*cam.scale; cam.y = sy - before.y*cam.scale;
  }, { passive:false });

  function closePopover(){ if(popover){ popover.remove(); popover=null; } }
  async function openPopover(node, sx, sy){
    selectedId = node.id; closePopover();
    const mine = document.createElement('div'); mine.className = 'graph-pop';
    popover = mine;
    mine.style.left = Math.max(2, Math.min(sx, bw()-184)) + 'px';
    mine.style.top  = Math.max(2, Math.min(sy, bh()-90)) + 'px';
    mine.innerHTML = '<div class="empty">loading…</div>';
    e.body.appendChild(mine);
    try {
      const r = await fetch('/api/page/'+node.id, {cache:'no-store'});
      const d = await r.json();
      if (popover !== mine) return;
      if (d.error){ mine.innerHTML = `<div class="err">${esc(d.error)}</div>`; return; }
      const linkRows = (d.links||[]).map(l=>`<div class="gp-link" data-id="${esc(l.id)}">${l.outgoing?'→':'←'} <b>${esc(l.linkType)}</b> ${esc(l.title)}</div>`).join('');
      mine.innerHTML = `
        <div class="gp-x">\xd7</div>
        <div class="gp-ttl">${esc(d.title)}</div>
        <div class="gp-type">${esc(d.type)} \xb7 ${d.factCount} facts</div>
        ${d.compiledTruth ? `<div class="gp-truth">${esc(d.compiledTruth)}</div>` : ''}
        ${linkRows ? `<div class="gp-links">${linkRows}</div>` : ''}`;
      mine.querySelector('.gp-x').onclick = closePopover;
      mine.querySelectorAll('.gp-link').forEach(el => el.onclick = ()=>{
        const t = byId.get(el.dataset.id);
        if (t){ cam.x = bw()/2 - t.x*cam.scale; cam.y = bh()/2 - t.y*cam.scale; openPopover(t, bw()/2, bh()/2); }
      });
    } catch(err){ if (popover === mine) mine.innerHTML = `<div class="err">offline</div>`; }
  }

  e.body.appendChild(canvas);
  const legend = document.createElement('div');
  legend.className = 'graph-legend';
  legend.innerHTML = Object.entries(TYPE_COLOR).map(([t,c])=>`<span><i style="background:${c}"></i>${t}</span>`).join('') + '<span class="graph-refresh" title="refresh">↻</span>';
  e.body.appendChild(legend);
  legend.querySelector('.graph-refresh').onclick = load;

  observer = new ResizeObserver(fit); observer.observe(e.body); fit();

  async function load(){
    closePopover();
    e.body.querySelectorAll('.err').forEach(x=>x.remove());
    try {
      const r = await fetch('/api/graph', {cache:'no-store'});
      const d = await r.json();
      if (d.error) throw new Error(d.error);
      const w = bw(), h = bh(), N = d.nodes.length || 1;
      nodes = d.nodes.map((n,i)=>{ const a=(i/N)*Math.PI*2; return {...n, x:w/2+Math.cos(a)*120+(i%7), y:h/2+Math.sin(a)*120+(i%5), vx:0, vy:0}; });
      links = d.links; byId = new Map(nodes.map(n=>[n.id,n])); alpha = 1; selectedId = null; hoverNode = null;
      const old = e.body.querySelector('.empty'); if(old) old.remove();
      if (!nodes.length){ const em=document.createElement('div'); em.className='empty'; em.textContent='no pages yet'; e.body.appendChild(em); }
    } catch(err){
      const m = document.createElement('div'); m.className='err'; m.textContent = 'graph offline — '+(err.message||err);
      e.body.appendChild(m);
    }
  }
  await load();
  loop();

  e._graphCleanup = ()=>{ cancelAnimationFrame(raf); if(observer) observer.disconnect(); closePopover(); };
}

// =================== polling ===================
async function poll(def){
  const e = els[def.id]; if(!e) return;
  if(def.custom) return;            // custom windows (graph) manage their own body
  try { const r = await fetch(def.api, {cache:'no-store'}); const d = await r.json();
    e.body.innerHTML = def.render(d);
  } catch(err){ e.body.innerHTML = `<div class="err">offline — ${esc(err.message||err)}</div>`; }
}
function pollAll(){ WINDOWS.forEach(poll); setTimeout(updateBmoState, 200); }
function updateBmoState(){
  const hr = new Date().getHours();
  const currentMood = face.dataset.mood;
  // only update ambient mood if not in an active chat state
  if(currentMood !== 'thinking' && currentMood !== 'happy'){
    if(dreaming){
      setMood('dreaming');
    } else if(hr < 6){
      setMood('resting');
    } else if(currentMood === 'dreaming' || currentMood === 'resting'){
      setMood('awake');
    }
  }
}

// ===================== CHAT CLIENT =====================
const TOKEN_KEY = 'somnus.chatToken';
let currentPollId = null;   // tracks the latest in-flight pollReply; older polls bail early
const log = document.getElementById('chatlog');
const form = document.getElementById('chatform');
const input = document.getElementById('chatinput');
const face = document.getElementById('bmo-face');

function addMsg(who, text){
  const d = document.createElement('div');
  d.className = 'msg ' + who;            // who: 'you' | 'somnus' | 'sys'
  d.textContent = text;
  log.appendChild(d); log.scrollTop = log.scrollHeight;
  return d;
}
function setMood(m){ face.dataset.mood = m; }

async function loadHistory(){
  try {
    const r = await fetch('/api/chat/history', {cache:'no-store'});
    const rows = await r.json();
    for (const row of rows){
      addMsg('you', row.prompt);
      if (row.reply) addMsg(row.status === 'error' ? 'sys' : 'somnus', row.reply);
    }
  } catch {}
}

async function send(text, retried){
  addMsg('you', text); setMood('thinking');
  const headers = {'content-type':'application/json'};
  const tok = localStorage.getItem(TOKEN_KEY);
  if (tok) headers['x-somnus-token'] = tok;
  let res;
  try { res = await fetch('/api/chat', {method:'POST', headers, body:JSON.stringify({text})}); }
  catch(e){ setMood('awake'); return addMsg('sys', 'offline: '+e.message); }
  if (res.status === 401){
    setMood('awake');
    if (retried){ return addMsg('sys', 'wrong token — send again to retry.'); }
    const t = prompt('Somnus chat is locked. Enter the chat token:');
    if (t){ localStorage.setItem(TOKEN_KEY, t); return send(text, true); }   // one retry
    return addMsg('sys', 'locked — token required to send.');
  }
  if (!res.ok){ setMood('awake'); return addMsg('sys', 'error: '+(await res.text())); }
  const { id } = await res.json();
  currentPollId = id;
  pollReply(id);
}

async function pollReply(id, tries=0){
  if (id !== currentPollId) return;   // a newer send() has taken over; abandon this loop
  if (tries > 60){ setMood('awake'); return addMsg('sys','(timed out waiting for Somnus)'); }
  try {
    const r = await fetch('/api/chat/'+id, {cache:'no-store'});
    const d = await r.json();
    if (d.status === 'done'){ setMood('happy'); addMsg('somnus', d.reply); setTimeout(()=>setMood('awake'),3000); return; }
    if (d.status === 'error'){ setMood('awake'); addMsg('sys', d.reply || 'turn failed'); return; }
  } catch {}
  setTimeout(()=>pollReply(id, tries+1), 1500);   // pending/running
}

form.addEventListener('submit', e=>{
  e.preventDefault();
  const text = input.value.trim(); if(!text) return;
  input.value=''; send(text);
});
loadHistory();

// =================== BMO drag (legs flail while moving) ===================
const bmo = document.getElementById('bmo');
function bmoPlace(x, y){ bmo.style.left = x+'px'; bmo.style.top = y+'px'; bmo.style.transform = 'none'; }
function bmoSave(x, y){ localStorage.setItem('somnus.bmo', JSON.stringify({x, y})); }
function bmoRestore(){
  try { const p = JSON.parse(localStorage.getItem('somnus.bmo')||'null'); if(p) bmoPlace(p.x, p.y); } catch{}
}
function bmoRecenter(){ localStorage.removeItem('somnus.bmo');
  bmo.style.left='50%'; bmo.style.top='50%'; bmo.style.transform='translate(-50%,-50%)'; }
bmo.addEventListener('pointerdown', ev=>{
  if(ev.target.closest('.bmo-screen')) return;          // let the chat screen work
  ev.preventDefault(); bmo.setPointerCapture(ev.pointerId);
  const r = bmo.getBoundingClientRect();                 // switch from centered-transform to px
  let x = r.left, y = r.top; bmoPlace(x, y);
  const sx = ev.clientX, sy = ev.clientY, ox = x, oy = y;
  bmo.classList.add('dragging');
  const move = m=>{
    x = Math.max(-40, Math.min(innerWidth - r.width + 40, ox + (m.clientX-sx)));
    y = Math.max(0,   Math.min(innerHeight - 60,           oy + (m.clientY-sy)));
    bmoPlace(x, y);
  };
  const up = ()=>{ bmo.removeEventListener('pointermove',move); window.removeEventListener('pointerup',up);
    bmo.classList.remove('dragging'); bmoSave(x, y); };
  bmo.addEventListener('pointermove', move); window.addEventListener('pointerup', up);
});

// =================== boot ===================
function boot(){
  const layout = loadLayout(), dflt = defaultLayout();
  WINDOWS.forEach(def => makeWindow(def, layout[def.id] || dflt[def.id]));
  if (els.graph) initGraph(els.graph);
  bmoRestore();
  pollAll(); setInterval(pollAll, 8000);
}
$('#reset').addEventListener('click', ()=>{ localStorage.removeItem('somnus.layout');
  const l=defaultLayout(); for(const id in els){ Object.assign(els[id], l[id]); place(els[id]); } releaseFocus(); bmoRecenter(); });
// On browser resize, keep each window's size + position — only clamp any
// window that would fall off the new viewport back into view. Never reset to
// the default layout (that was clobbering dragged/resized windows).
let rt; addEventListener('resize', ()=>{ clearTimeout(rt); rt=setTimeout(()=>{
  for(const id in els){ const e=els[id]; if(e._restore) continue;
    e.w = Math.min(e.w, innerWidth-24);
    e.h = Math.min(e.h, innerHeight-24);
    e.x = Math.max(0, Math.min(e.x, innerWidth - e.w));
    e.y = Math.max(0, Math.min(e.y, innerHeight - e.h));
    place(e);
  }
  saveLayout();
},200); });
boot();
</script>
