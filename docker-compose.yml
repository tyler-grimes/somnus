# Second Brain — single-VM deployment
# One Postgres holds everything: vectors, FTS, graph edges, facts, queue, logs.
# Design: research/database-selection.md §6
services:
  db:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_DB: brain
      POSTGRES_USER: brain
      POSTGRES_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in .env}
    ports:
      - "127.0.0.1:${DB_PORT:-5432}:5432" # localhost only; use Tailscale for remote access
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro # schema runs on first start
    shm_size: "256mb"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U brain -d brain"]
      interval: 5s
      timeout: 3s
      retries: 10

  # One-shot schema migrator: applies db/init/*.sql once each (tracked in
  # schema_migrations) before agent/dashboard start, so new migrations no
  # longer need a manual psql. Exits 0; agent/dashboard gate on its success.
  migrate:
    image: pgvector/pgvector:pg17
    profiles: ["agent"]
    restart: "no"
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGHOST: db
      PGUSER: brain
      PGDATABASE: brain
      PGPASSWORD: ${DB_PASSWORD}
    volumes:
      - ./db/init:/migrations:ro
      - ./db/migrate.sh:/migrate.sh:ro
    entrypoint: ["bash", "/migrate.sh"]

  # Agent runtime: Telegram bot + Claude Agent SDK + brain-mcp (spawned via
  # stdio inside this container). Opt-in profile so local `up -d` on the Mac
  # can never start a second long-poll consumer — only the VM runs
  # `docker compose --profile agent up -d`.
  agent:
    build: .
    restart: unless-stopped
    profiles: ["agent"]
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    env_file: .env
    environment:
      # The container IS the sandbox boundary (design spec §2). This flips
      # sandboxSettings() off via the existing config.bashAutoApprove wiring.
      BASH_AUTO_APPROVE: "true"
      # In-network hostname; overrides the localhost URL in .env.
      DATABASE_URL: postgres://brain:${DB_PASSWORD}@db:5432/brain
      WORKSPACE_DIR: /app/workspace
      TZ: ${TZ:-America/Denver}
      WORKSTATION_SSH_HOST: ${WORKSTATION_SSH_HOST:-}
      WORKSTATION_SSH_USER: ${WORKSTATION_SSH_USER:-}
    volumes:
      - agent_workspace:/app/workspace
      - claude_state:/home/node/.claude
      # term bridge: dedicated SSH key (host file, 0600), read-only in-container.
      # Path is under .ssh/ so SENSITIVE_PATH_RE keeps the agent from reading it.
      - /home/somnus/.ssh/term-bridge:/home/node/.ssh/term-bridge:ro

  dashboard:
    build:
      context: ./dashboard
    restart: unless-stopped
    profiles: ["agent"]
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      # Bind the Tailscale IP only (DASHBOARD_BIND in VM .env), not 0.0.0.0:
      # the firewall is defense-in-depth, never the sole boundary.
      - "${DASHBOARD_BIND:-127.0.0.1}:3001:3001"
    environment:
      DATABASE_URL: postgres://brain:${DB_PASSWORD}@db:5432/brain
      TZ: ${TZ:-America/Denver}

  # Later (see research/README.md build order):
  #   wal-archive: WAL-G continuous archiving to object storage

volumes:
  pg_data:
  agent_workspace:
  claude_state:
